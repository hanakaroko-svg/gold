<!DOCTYPE html>
<!-- saved from url=(0070)file:///Users/nakazawahinako/Downloads/otano-price-presentation_1.html -->
<html lang="ja"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OtanO｜カスタムオーダー 価格のご提示</title>
<link rel="preconnect" href="https://fonts.googleapis.com/">
<link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="">
<link href="./OtanO｜カスタムオーダー 価格のご提示_files/css2" rel="stylesheet">
<style>
  :root{
    --paper:#FAF7F1;--panel:#F2ECE0;--ink:#211C17;--ink-soft:#6B6155;
    --line:#E2DACB;--line-strong:#CDC2AD;--gold:#9C7A2E;--slate:#5A6660;--brand2:#8A7B5C;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{background:var(--paper);color:var(--ink);font-family:"Inter",system-ui,-apple-system,sans-serif;
    font-feature-settings:"tnum" 1;line-height:1.55;padding:clamp(16px,4vw,40px);}
  .sheet{max-width:680px;margin:0 auto;}

  /* Editor (OtanO only) */
  .editor{border:1px dashed var(--line-strong);border-radius:12px;padding:16px 18px;margin-bottom:26px;background:rgba(255,255,255,.5);}
  .editor .tag{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);font-weight:600;margin:0 0 4px;}
  .editor .tagsub{font-size:11px;color:var(--ink-soft);margin:0 0 14px;}
  .frow{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px;}
  @media(max-width:560px){.frow{grid-template-columns:1fr;}}
  .f{margin-bottom:2px;} .f.full{grid-column:1 / -1;}
  .f label{display:block;font-size:11.5px;color:var(--ink-soft);margin-bottom:3px;font-weight:500;}
  .iw{position:relative;display:flex;align-items:center;}
  .iw .cur{position:absolute;left:11px;font-size:12px;color:var(--ink-soft);pointer-events:none;}
  .iw .unit{position:absolute;right:11px;font-size:11px;color:var(--ink-soft);pointer-events:none;}
  input,select{width:100%;border:1px solid var(--line-strong);background:#fff;border-radius:7px;padding:9px 11px;
    font-family:inherit;font-size:14px;color:var(--ink);font-feature-settings:"tnum" 1;transition:border-color .15s,box-shadow .15s;}
  input.pl{padding-left:24px;}
  input:focus,select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(156,122,46,.12);}
  input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  input[type=number]{-moz-appearance:textfield;}
  .fetchrow{display:flex;align-items:center;gap:9px;margin-top:6px;flex-wrap:wrap;}
  .fetchbtn{font:inherit;font-size:10.5px;font-weight:500;color:var(--gold);cursor:pointer;background:transparent;border:1px solid var(--line-strong);border-radius:20px;padding:3px 10px;}
  .fetchbtn:hover{border-color:var(--gold);}
  .fetchout{font-size:11px;color:var(--ink-soft);} .fetchout.ok{color:var(--ink);} .fetchout.err{color:#A6402F;}
  .fetchout a{color:var(--gold);}
  .linkbox{margin-top:16px;border-top:1px solid var(--line);padding-top:14px;}
  .linkbox label{display:block;font-size:11.5px;color:var(--ink-soft);font-weight:600;margin-bottom:6px;}
  .linkrow{display:flex;gap:8px;}
  .linkrow input{font-size:12px;color:var(--ink-soft);background:#fff;}
  .copybtn{white-space:nowrap;font:inherit;font-size:12px;font-weight:500;color:#fff;background:var(--ink);border:none;border-radius:7px;padding:0 16px;cursor:pointer;}
  .copybtn:hover{background:#000;}
  .linkhint{font-size:11px;color:var(--ink-soft);margin-top:8px;line-height:1.5;}

  /* Quote (shop-facing) */
  .quote{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:clamp(22px,4vw,34px);}
  .brand{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);font-weight:600;}
  .qtitle{font-family:"Fraunces",Georgia,serif;font-weight:500;font-size:clamp(20px,3.5vw,26px);margin:6px 0 2px;letter-spacing:-.01em;}
  .qitem{font-size:14px;color:var(--ink-soft);margin-bottom:20px;} .qitem b{color:var(--ink);font-weight:500;}
  .spec{display:flex;flex-wrap:wrap;gap:8px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:14px 0;margin-bottom:20px;}
  .spec .cell{flex:1;min-width:110px;}
  .spec .k{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;}
  .spec .v{font-size:15px;font-weight:500;margin-top:2px;}
  table.bd{width:100%;border-collapse:collapse;font-size:13.5px;margin-bottom:6px;}
  table.bd td{padding:8px 0;border-bottom:1px solid var(--line);}
  table.bd td.r{text-align:right;font-variant-numeric:tabular-nums;font-weight:500;}
  table.bd tr.sum td{border-top:1px solid var(--line);border-bottom:none;color:var(--ink-soft);font-size:12.5px;}
  table.bd td small{color:var(--ink-soft);font-size:11px;display:block;font-weight:400;margin-top:1px;}
  .bar{height:28px;border-radius:6px;overflow:hidden;display:flex;margin:12px 0 6px;background:#e9e2d4;box-shadow:inset 0 0 0 1px var(--line);}
  .bar span{display:block;height:100%;transition:width .3s ease;}
  .seg-gold{background:var(--gold);} .seg-cost{background:var(--slate);} .seg-design{background:var(--brand2);}
  .legend{display:flex;flex-wrap:wrap;gap:6px 14px;font-size:11px;color:var(--ink-soft);margin-bottom:22px;}
  .legend i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:middle;}
  .price{border-top:1px solid var(--line-strong);padding-top:18px;}
  .price .k{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;}
  .price .v{font-family:"Fraunces",serif;font-weight:600;font-size:clamp(32px,6vw,46px);line-height:1.05;margin-top:4px;letter-spacing:-.01em;}
  .price .tax{font-size:12px;color:var(--ink-soft);margin-top:4px;}
  .note{margin-top:20px;font-size:12px;color:var(--ink-soft);line-height:1.65;border-top:1px solid var(--line);padding-top:16px;}
  .note b{color:var(--ink);font-weight:600;}
</style>
</head>
<body>
<div class="sheet">

  <div class="editor" id="editor" style="">
    <p class="tag">Setup</p>
    <p class="tagsub">
    <div class="frow">
      <div class="f full"><label for="item">品目名</label><input id="item" type="text" value="Kusuma Necklace ／ 別注"></div>
      <div class="f"><label for="material">素材</label><input id="material" type="text" value="K18WG（ホワイトゴールド）"></div>
      <div class="f"><label for="weight">重量（18金）</label><div class="iw"><input id="weight" type="number" value="110" min="0" step="1"><span class="unit">g</span></div></div>
      <div class="f">
        <label for="gold">純金グラム単価</label>
        <div class="iw"><span class="cur">¥</span><input id="gold" class="pl" type="number" value="25000" min="0" step="10"><span class="unit">/g</span></div>
        <div class="fetchrow"><button type="button" id="fetchBtn" class="fetchbtn">相場を取得</button><span id="fetchOut" class="fetchout err"><a href="https://gold.tanaka.co.jp/commodity/souba/" target="_blank" rel="noopener">田中で確認</a>して入力</span></div>
      </div>
      <div class="f"><label for="labor">工賃</label><div class="iw"><span class="cur">¥</span><input id="labor" class="pl" type="number" value="150000" min="0" step="1000"></div></div>
      <div class="f"><label for="misc">送料・保険・マテリアルテスト・雑費</label><div class="iw"><span class="cur">¥</span><input id="misc" class="pl" type="number" value="76000" min="0" step="1000"></div></div>
      <div class="f"><label for="price">ご提示価格</label><div class="iw"><span class="cur">¥</span><input id="price" class="pl" type="number" value="4280000" min="0" step="10000"></div></div>
      <div class="f"><label for="pricelabel">価格の名目</label>
        <select id="pricelabel">
          <option value="0" selected="">卸値</option>
          <option value="1">ご提示価格</option>
          <option value="2">定価（店頭価格）</option>
        </select>
      </div>
    </div>
   
  </div>

  <div class="quote">
    <div class="brand">OtanO</div>
    <div class="qtitle">カスタムオーダー 価格のご提示</div>
    <div class="qitem" id="qItem"><b>Kusuma Necklace ／ 別注</b></div>
    <table class="bd" id="bd"><tbody><tr><td>素材費（18金地金）<small>純金相当分・鋳造ロス込み。金相場により変動します</small></td><td class="r">¥2,158,470</td></tr><tr><td>工賃<small>鋳造・エナメル・石留め・メッキ 等</small></td><td class="r">¥150,000</td></tr><tr><td>送料・保険・マテリアルテスト・雑費</td><td class="r">¥76,000</td></tr><tr class="sum"><td>実費合計</td><td class="r"></td></tr><tr><td>オリジナルデザイン・別注対応・ブランド価値</td><td class="r">¥1,955,531</td></tr></tbody></table>
    <div class="bar" id="bar" aria-hidden="true"><span class="seg-gold" style="width:50.43153037383178%"></span><span class="seg-cost" style="width:3.878504672897196%"></span><span class="seg-design" style="width:45.68996495327103%"></span></div>
    <div class="legend" id="legend"><span><i class="seg-gold"></i>地金 50%</span><span><i class="seg-cost"></i>工賃・諸費 4%</span><span><i class="seg-design"></i>デザイン・別注・ブランド 46%</span></div>
    <div class="price">
      <div class="k" id="pLabel">卸値</div>
      <div class="v" id="qPrice">¥4,280,000</div>
      <div class="tax">表示は税別です。</div>
    </div>
     </div>
</div>

<script>
(function(){
  var $=function(i){return document.getElementById(i);};
  var PURITY=0.755, LOSS=1.13;
  var LABELS=["卸値（OtanOお支払い額）","ご提示価格","定価（店頭価格）"];
  var LABELS_SHORT=["卸値","ご提示価格","定価"];
  function yen(n){if(!isFinite(n))n=0;return "¥"+Math.round(n).toLocaleString("ja-JP");}
  function pctOf(a,b){if(!b)return "0%";return Math.round(a/b*100)+"%";}

  function renderQuote(v){
    var material=v.gold*v.weight*PURITY*LOSS;
    var realCost=material+v.labor+v.misc;
    var design=Math.max(0, v.price-realCost);
    $("qItem").innerHTML="<b>"+(v.item||"—")+"</b>";
    $("sMaterial").textContent=v.material||"—";
    $("sWeight").textContent=v.weight?v.weight+" g":"—";
    $("sGold").textContent=v.gold?("純金 "+yen(v.gold)+"/g"+(v.date?("・"+v.date):"")):"—";

    $("bd").innerHTML=
      '<tr><td>素材費（18金地金）<small>純金相当分・鋳造ロス込み。金相場により変動します</small></td><td class="r">'+yen(material)+'</td></tr>'+
      '<tr><td>工賃<small>鋳造・エナメル・石留め・メッキ 等</small></td><td class="r">'+yen(v.labor)+'</td></tr>'+
      '<tr><td>送料・保険・マテリアルテスト・雑費</td><td class="r">'+yen(v.misc)+'</td></tr>'+
      '<tr class="sum"><td>実費合計</td><td class="r">'+yen(realCost)+'</td></tr>'+
      '<tr><td>オリジナルデザイン・別注対応・ブランド価値</td><td class="r">'+yen(design)+'</td></tr>';

    var base=v.price>0?v.price:1;
    $("bar").innerHTML=
      '<span class="seg-gold" style="width:'+Math.min(100,material/base*100)+'%"></span>'+
      '<span class="seg-cost" style="width:'+Math.min(100,(v.labor+v.misc)/base*100)+'%"></span>'+
      '<span class="seg-design" style="width:'+Math.min(100,design/base*100)+'%"></span>';
    $("legend").innerHTML=
      '<span><i class="seg-gold"></i>地金 '+pctOf(material,base)+'</span>'+
      '<span><i class="seg-cost"></i>工賃・諸費 '+pctOf(v.labor+v.misc,base)+'</span>'+
      '<span><i class="seg-design"></i>デザイン・別注・ブランド '+pctOf(design,base)+'</span>';

    $("pLabel").textContent=LABELS_SHORT[v.label]||"ご提示価格";
    $("qPrice").textContent=yen(v.price);
    $("qNote").innerHTML=
    
  }

  function readInputs(){
    return {
      item:$("item").value.trim(), material:$("material").value.trim(),
      weight:+$("weight").value||0, gold:+$("gold").value||0,
      labor:+$("labor").value||0, misc:+$("misc").value||0,
      price:+$("price").value||0, label:+$("pricelabel").value||0,
      date:new Date().toLocaleDateString("ja-JP")
    };
  }
  function buildLink(v){
    var base=(location.origin&&location.origin!=="null"?location.origin:"")+location.pathname;
    var p=new URLSearchParams();
    p.set("i",v.item);p.set("m",v.material);p.set("w",v.weight);p.set("g",v.gold);
    p.set("lb",v.labor);p.set("mc",v.misc);p.set("p",v.price);p.set("l",v.label);p.set("d",v.date);
    return base+"?"+p.toString();
  }

  var params=new URLSearchParams(location.search);
  if(params.has("p")){
    // VIEW MODE (shop): quote only
    renderQuote({
      item:params.get("i")||"", material:params.get("m")||"",
      weight:+params.get("w")||0, gold:+params.get("g")||0,
      labor:+params.get("lb")||0, misc:+params.get("mc")||0,
      price:+params.get("p")||0, label:+params.get("l")||0, date:params.get("d")||""
    });
  } else {
    // EDITOR MODE (OtanO)
    $("editor").style.display="";
    function update(){var v=readInputs();renderQuote(v);$("sharelink").value=buildLink(v);}
    ["item","material","weight","gold","labor","misc","price","pricelabel"].forEach(function(id){
      $(id).addEventListener("input",update);$(id).addEventListener("change",update);
    });
    $("copyBtn").addEventListener("click",function(){
      var f=$("sharelink");f.select();
      var done=function(){$("copyBtn").textContent="コピー完了";setTimeout(function(){$("copyBtn").textContent="コピー";},1500);};
      if(navigator.clipboard){navigator.clipboard.writeText(f.value).then(done,function(){document.execCommand("copy");done();});}
      else{document.execCommand("copy");done();}
    });
    // spot fetch (editor only)
    (function(){
      var out=$("fetchOut"),btn=$("fetchBtn");
      function go(){
        btn.disabled=true;out.className="fetchout";out.textContent="取得中…";
        var c=new AbortController();var t=setTimeout(function(){c.abort();},8000);
        fetch("https://data-asg.goldprice.org/dbXRates/JPY",{signal:c.signal,cache:"no-store"})
          .then(function(r){if(!r.ok)throw 0;return r.json();})
          .then(function(d){var oz=d&&d.items&&d.items[0]&&d.items[0].xauPrice;if(!oz)throw 0;
            var g=Math.round(oz/31.1034768);out.className="fetchout ok";
            out.innerHTML="スポット ¥"+g.toLocaleString("ja-JP")+"/g · <a href='#' id='applySpot'>使う</a>";
            $("applySpot").onclick=function(e){e.preventDefault();$("gold").value=g;update();};})
          .catch(function(){out.className="fetchout err";
            out.innerHTML="<a href='https://gold.tanaka.co.jp/commodity/souba/' target='_blank' rel='noopener'>田中で確認</a>して入力";})
          .finally(function(){clearTimeout(t);btn.disabled=false;});
      }
      btn.addEventListener("click",go);go();
    })();
    update();
  }
})();
</script>


</body></html>
